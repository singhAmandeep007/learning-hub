# Common Security Headers Configuration

# Basic security headers
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content Security Policy - Allow Firebase Storage URLs and blob URLs for media
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://storage.googleapis.com https://firebasestorage.googleapis.com; media-src 'self' blob: https://storage.googleapis.com https://firebasestorage.googleapis.com; object-src 'self' blob: https://storage.googleapis.com https://firebasestorage.googleapis.com; frame-src 'self' blob: https://firebasestorage.googleapis.com https://storage.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self';" always;
