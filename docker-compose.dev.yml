services:
  # Firebase Emulator
  firebase-emulator:
    image: andreysenov/firebase-tools:14.2.0-node-22
    container_name: learninghub-firebase-emulator
    ports:
      - "4000:4000" # Emulator UI
      - "8080:8080" # Firestore
      - "9199:9199" # Cloud Storage
    volumes:
      - ./backend/firebase.json:/home/node/firebase.json
      - ./backend/.firebaserc:/home/node/.firebaserc
      - ./backend/firestore.rules:/home/node/firestore.rules
      - ./backend/storage.rules:/home/node/storage.rules
      - ./backend/firestore.indexes.json:/home/node/firestore.indexes.json
    command: firebase emulators:start --project learninghub-81cc6
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: learninghub-backend
    ports:
      - "8000:8000" # Main server
    volumes:
      - ./backend:/app
      - backend_modules:/go/pkg/mod
    environment:
      - ENV_MODE=dev
      - PORT=8000
      - CORS_ORIGINS=http://localhost:3000
      - FIREBASE_PROJECT_ID=learninghub-81cc6
      - FIRESTORE_EMULATOR_HOST=firebase-emulator:8080
      - FIREBASE_STORAGE_EMULATOR_HOST=firebase-emulator:9199
      - FIREBASE_DB_ID=learninghub
      - FIREBASE_STORAGE_BUCKET=learninghub-81cc6.firebasestorage.app
    command: sh -c "until curl -f http://firebase-emulator:4000; do echo 'Waiting for Firebase...'; sleep 5; done && air -c .air.toml"
    depends_on:
      - firebase-emulator
    networks:
      - app-network
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: learninghub-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_PROXY_API_HOST=http://backend:8000
      - VITE_PORT=3000
      - VITE_API_BASE_URL=/api/v1
      - BACKEND_HOST=backend
      - BACKEND_PORT=8000
    command: sh -c "until curl -f http://backend:8000/health; do echo 'Waiting for Backend...'; sleep 5; done && npm run dev"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  backend_modules:
  frontend_modules:

networks:
  app-network:
    driver: bridge
